    min_len: 2
    max_len: 3

# [默认] 通用称谓后缀，古风/仙侠通用
address_suffixes:
  - "大哥"
  - "大嫂"
  - "大婶"
  - "大娘"
  - "大爷"
  - "大姐"
  - "大伯"
  - "师妹"
  - "师弟"
  - "师姐"
  - "师兄"
  - "师叔"
  - "师伯"
  - "嫂子"
  - "姑娘"
  - "娘子"
  - "前辈"
  - "兄"
  - "哥"

# [默认] 被判为以下分类的术语整体过滤掉
filterable_categories:
  - "通用物品"
  - "通用NPC"

# [默认] 通用降噪规则。Q5/Q6 回填后请在此追加古剑专属边界硬规则。
extraction_notes:
  - "中文人名模式强制提取：老X、小X、阿X、X嫂、X婶、X伯、X叔、X爷、X娘、X姑、X儿、X子、X哥、X弟——一个不漏"
  - "常规通称不提取：先生、大侠、少侠、公子、姑娘、弟子、同门、前辈、掌门——除非是专有名字的一部分"
  - "通用场所不提取：书房、医馆、客栈、夜市等无专有名称的场所"
  - "通用原材料不提取：柴火、木炭、绳子等日常材料"
  - "节气/泛时间词不提取：子时、春分等"

extract_examples:
  # [PM] Q4，去燕云专名后的通用表述
  include:
    - "所有人名 / NPC 名（含路人、单次提及，出现即提取）"
    - "技能名称"
    - "武器名称"
    - "地名建筑、门派势力"
    - "道具、圣物、货币、资源"
    - "战斗 BUFF / 战斗机制 / UI 系统 / 玩法机制"
    - "成就"
    - "道具名称"
    - "角色属性"
  # [默认] Q5 为空，暂用通用噪音类型，待 PM 校准
  exclude:
    - "通用日常物品（如：木炭、草鞋、火把、柴火、绳子）"
    - "通用称谓/泛称（如：大侠、公子、弟子、长老、前辈——非专有名字的一部分时）"
    - "成语/固定短语"
    - "时间词（如：子时、昨夜）"
    - "无专有名称的通用场所（如：书房、医馆、客栈）"

# Q10/Q11 为空。下面仅通用负例占位（提精度）；古剑专属正例缺失会显著掉召回，必须 PM 回填。
# [TODO] PM 补古剑正例，格式：
#   - input: "<古剑原文一句>"
#     output:
#       - term: "<术语>"
#         category: "<上面 term_categories 中的一类>"
fewshot_examples:
  - input: "用木炭生火，草鞋踩在石板上"
    output: []
  - input: "长老说弟子们不得擅自出门，前辈也不例外"
    output: []
  - input: "他一飞冲天，大鹏展翅般冲出重围"
    output: []

# [PM] Q7（原填的是描述句，已规整为可单选的分类标签；末两类为可过滤兜底桶）
term_categories:
  - "NPC名"
  - "技能"
  - "武器"
  - "地名建筑"
  - "门派势力"
  - "道具物品"
  - "圣物法宝"
  - "代币货币"
  - "资源材料"
  - "战斗BUFF"
  - "战斗机制"
  - "UI系统"
  - "玩法机制"
  - "成就称号"
  - "属性"
  - "通用NPC"
  - "通用物品"

# [默认] Q8 默认中→英；Q9 为空，暂用通用仙侠译法，待 PM 校准
translation_rules:
  - "角色名/NPC名 → 音译（拼音）"
  - "技能/招式名 → 意译，传达含义"
  - "地点/建筑名 → 意译为主，必要时音译+意译结合"
  - "物品/道具名 → 简洁意译"
  - "头衔称谓 → 意译（如公子→Master, 长老→Elder）"
  - "每个术语一行，格式：中文术语 → 英文译文"
