# 边界硬规则（据官方术语表 + 世界观文档归纳）
extraction_notes:
  - "上古神祇/神兽/魔族专名一律提取，且沿用术语表既定英译，勿自创：伏羲Fu Xi、女娲Nuwa、阎罗Yama、烛龙Aurogon、朱雀the Vermillion Bird、蚩尤Chi You、盘古Pangu"
  - "三界与世界概念作术语：常世、天界/人界/地界、魔界(魔域)、清气Clear Ki、浊气Turbid Ki、地脉Earthveins、混沌、阴阳五行"
  - "冥界轮回词作术语：地界司判(=地府司判/黄泉司判)、鬼差、牛头马面、忘川、轮回井、怨灵、荒魂"
  - "法器神器作术语：箍命索、镇石、(古)剑/SWORD、玉佩、寰印未央、火羽、创世之火、建木"
  - "术法巫术作术语：楔魂之术、命魂牵引之术、奇门遁甲"
  - "部族/势力/称号官职提取：九黎部族、安邑部族、有熊部落、守陵人、魔帝、黄帝、大巫祝、星君、X神(金/木/水/火/土/风/雨)"
  - "同一实体多名分别提取并视作同义：晏闻=真身朱雀(别名Ash)、姜玄=化名祝方、阎罗=Yan Luo/Yama"
  - "中文人名模式强制提取：老X、小X、阿X、X嫂、X爷、X娘、X儿、X将军——一个不漏"
  - "通用泛称不提取：大侠、公子、弟子、先生、族人、长辈（非专有名字的一部分时）"
  - "神/仙/鬼/妖/魔 作泛指时不提取，作专名一部分时提取（如『火神』提，泛指『众神』不提）"
  - "通用日常物品/无专名场所/成语/泛时间词不提取"

extract_examples:
  include:
    - "角色/NPC 名（晏闻、姜玄、楚鸣、由庚、魁苓 等，含路人单次提及）"
    - "神祇与神兽（伏羲、女娲、阎罗、烛龙、朱雀、商羊…）"
    - "魔族与种族（蚩尤、朔、魔族、神族、人族、妖族）"
    - "部族势力（九黎部族、安邑部族、有熊部落、守陵人）"
    - "地名秘境（菽山、神陵、不周山、忘川、地府、洪涯境…）"
    - "法器神器（箍命索、(古)剑/SWORD、镇石、寰印未央、火羽…）"
    - "灵力与世界概念（清气、浊气、地脉、三界、混沌…）"
    - "冥界轮回（地界司判、鬼差、牛头、马面、轮回井…）"
    - "术法巫术（楔魂之术、命魂牵引之术、奇门遁甲）"
    - "称号官职（魔帝、黄帝、大巫祝、星君、X神）"
    - "游戏系统词：技能名、武器名、道具名、战斗BUFF/机制、UI系统、玩法机制、成就、角色属性"
  exclude:
    - "通用日常物品（如：木炭、绳子、火把、柴火）"
    - "通用称谓/泛称（如：大侠、公子、弟子、先生、族人、长辈——非专有名字的一部分时）"
    - "神/仙/鬼/妖/魔 等作泛指时（如：众神、群魔、孤魂野鬼）"
    - "成语/固定短语；泛时间词（如：子时、昨夜）"
    - "无专有名称的通用场所（如：书房、客栈、村落）"

