# 译法规则据世界观文档官方英译归纳（术语表优先于自译）
translation_rules:
  - "角色/凡人名 → 音译拼音、无声调：晏闻 Yan Wen、姜玄 Jiang Xuan、楚鸣 Chu Ming、魁苓 Kui Ling"
  - "上古神祇 → 音译拼音：伏羲 Fu Xi、女娲 Nuwa、神农 Shennong、盘古 Pangu；有通行神话英译的沿用：阎罗 Yama、黄帝 the Yellow Emperor"
  - "神兽/特殊神名 → 意译或既定造词：朱雀 the Vermillion Bird、烛龙 Aurogon"
  - "灵力/世界概念 → 意译且固定：气译 Ki（清气 Clear Ki、浊气 Turbid Ki）、地脉 Earthveins、混沌 chaos、三界 the Three Realms（天界 Upper / 人界 Middle / 地界 Under Realm）、魔域/魔界 the Outer World"
  - "法器/神器 → 意译：箍命索 Bandages of Sealing、镇石 Warding Stone、寰印未央 Seal of Endless、火羽 fire feather"
  - "剑/古剑 → 专有大写 SWORD"
  - "地名 → 音译为主：菽山 Mount Shu、不周山 Mount Buzhou、安邑 Anyi、咸阳 Xianyang；音译+意译并列：忘川 Wang Chuan River / River of Oblivion；纯意译：神陵 Divine Mausoleum"
  - "部族 → 音译+Clan/Tribe：九黎部族 the Jiuli Clan、有熊部落 Youxiong tribe"
  - "称号/官职 → 意译：地界司判 Judge of the Under Realm、大巫祝 Arch Shaman、魔帝 Demon Emperor、X神 god of X、星君 Star Lord"
  - "术法 → 意译：楔魂之术 Soul Embedding Spell、命魂牵引之术 Spell of Soul-guiding；术数约定俗成音译：奇门遁甲 Qimen Dunjia"
  - "同一实体多名统一译名（晏闻别名 Ash；阎罗 Yan Luo/Yama）；命中术语表的直接套用术语表译文"
  - "每个术语一行，格式：中文术语 → 英文译文"
