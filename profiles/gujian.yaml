# 古剑（中国上古神话志怪 ARPG · 古剑奇谭四 · 上海烛龙）术语抽取 profile
# 世界观(官方PV+世界观文档)：据《山海经》上古神话+志怪改编，三界(天界/人界/地界)+魔域设定；
#   主角晏闻(真身神兽朱雀)为地界司判，引渡亡魂。反派姜玄、伙伴剑灵由庚、守陵末裔楚鸣。
# 已接入两份参考：①官方术语表 ②世界观文档(中英对照)。
#   配套 glossary(★命门)：test_file/gujian_glossary.xlsx（128 词条，含官方英译），跑 pipeline 时作 glossary_path。
#   生成器：scripts/build_gujian_glossary.py
# 仍待补：游戏系统词(技能/武器/道具/BUFF/UI/成就 的实际游戏内名称)——两份参考均为剧情/世界观，
#   无系统词样例；待拿到游戏文本/UI 文案后补 fewshot 与 include。

game_type: "中国上古神话志怪题材ARPG（古剑·古剑奇谭四）"
task_description: "古剑游戏术语抽取任务——抽取游戏内所有专有名词，供翻译团队使用。"

core_principle: |
  文本中出现的中文专有名词——人名/NPC、神祇、神兽、魔族、部族势力、地名秘境、
  法器神器、术法、灵力与冥界概念——无论主线、支线、路人、单次提及，一律提取：出现即术语。
  本作为上古神话+志怪题材，神话叙事词与游戏系统词(技能/武器/道具/UI)同等对待，都要提取。

