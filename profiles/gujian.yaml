# 古剑（东方奇幻仙侠 ARPG）术语抽取 profile
# 来源：docs 项目配置填写表（填写人把答案填进了 C 列，仅 5/12 题）
#   [PM]   = 取自填写表 C 列真实答案（题1/2/3/4/7）
#   [默认] = 燕云通用基线，古风/仙侠通用，待按古剑校准
#   [TODO] = 填写表对应题为空，古剑专属内容无法代填，须 PM 回填
#
# 待 PM 回填（直接补到对应字段，去掉 TODO 注释即可）：
#   Q5  不要提取的内容        -> extract_examples.exclude / extraction_notes
#   Q6  特别注意（硬规则）    -> core_principle / extraction_notes
#   Q9  翻译策略             -> translation_rules（现为通用默认）
#   Q10 应该提取的例子(正例) -> fewshot_examples（现仅有负例，缺正例严重掉召回）
#   Q11 不该提取的例子(负例) -> fewshot_examples（填写表标“必填”，现为通用占位）

game_type: "东方奇幻仙侠单机ARPG（古剑）"          # [PM] Q1+Q2
task_description: "古剑游戏术语抽取任务——抽取游戏内所有专有名词，供翻译团队使用。"   # [PM] Q3

# [PM] Q4，强口径。古剑专属人名构词/单字名/排行命名规则待 Q6 补充后在此细化。
core_principle: |
  文本中出现的中文人名 / NPC 名——无论主线、支线、路人、单次提及——一律提取。
  人物重要性、出场次数、是否主线，都不影响：出现即术语。

# [默认] 百家姓确定性人名提取器，通用中文姓名，古剑直接可用
