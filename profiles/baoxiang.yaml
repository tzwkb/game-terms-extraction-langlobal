game_type: "像素风剧情向多路线日式角色扮演（我是个宝箱，你呢）"
task_description: "《我是个宝箱，你呢》游戏术语抽取任务——抽取游戏内所有专有名词，供翻译团队使用"

core_principle: |
  抽取游戏内所有专有名词。出现即术语，不论主次、出场次数。

  必须提取：
  - 所有人名（含 NPC、敌对角色、单次提及；以星期/数字/单字等非常规形式命名的角色也按人名提取，如「星期四」）
  - 种族名称（如：魔物）
  - 物品名（具名道具、装备、消耗品、材料等）
  - 地名（具名地点、建筑、区域，如：巫师小屋、贤者之塔）
  - 书名
  - 技能/魔法/配方名（具名的技能、魔法、合成配方）

  不提取：
  - 通用日常物品（无专名的普通物件）
  - 泛称 / 称谓（老板、店主、大侠一类无具体指代）
  - 无专名场所（店铺、书房、广场一类）

  特别注意（可判定硬规则）：
  - 普通描述性物品名称不作为专有名词。如「喷泉」「漆贴金箔」是对普通物件/工艺的描述，不提取。
  - 普通动作描述不作为技能名。如「放个魔法」中的「魔法」是泛指动作，不提取；只有具名的技能/魔法/配方才提取。
  - 以星期、数字、单字命名的角色（如「星期四」）按人名提取；同形的普通词（如表示日期的「星期四」）不提取，按语境判断，疑似处在 context 标「需人工核查」。

filterable_categories: []

address_suffixes: []

extraction_notes:
  - "出现即提取，不论主次与出场次数"
  - "以星期/数字/单字等非常规形式命名的角色按人名提取（如「星期四」是角色名）；同形普通词按语境不提取"
  - "普通描述性物品名（喷泉、漆贴金箔等对物件/工艺的描述）不提取"
  - "泛指动作里的「魔法」等不作技能名；只提取具名的技能/魔法/配方"
  - "通用日常物品、泛称称谓、无专名场所一律不提取"
  - "需要人工确认或区分的术语，一律在 context 标注「需人工核查」"

extract_examples:
  include:
    - "所有人名，含 NPC/敌对角色/单次提及（如：卡尔文、星期四）"
    - "种族名称（如：魔物）"
    - "物品名（道具/装备/消耗品/材料，如：角质凝胶）"
    - "地名（具名地点/建筑/区域，如：巫师小屋、贤者之塔）"
    - "书名"
    - "技能/魔法/配方名（具名的技能、魔法、合成配方）"
  exclude:
    - "通用日常物品（无专名普通物件）"
    - "泛称/称谓"
    - "无专名场所"
    - "普通描述性物品名（如：喷泉、漆贴金箔）"
    - "泛指动作的「魔法」等非具名技能"

fewshot_examples:
  - input: "从森林里的十字路口往南走，去巫师小屋找卡尔文。"
    output:
      - term: "巫师小屋"
        category: "地名"
      - term: "卡尔文"
        category: "人名"
  - input: "还真有点儿罕见，那个角质凝胶是魔物产的？"
    output:
      - term: "角质凝胶"
        category: "物品名"
      - term: "魔物"
        category: "种族名"
  - input: "哦，是星期四啊。早上好。"
    output:
      - term: "星期四"
        category: "人名"
        context: "以星期命名的角色名，需人工核查"
  - input: "进入贤者之塔看看。"
    output:
      - term: "贤者之塔"
        category: "地名"
  - input: "这是谁家，居然有喷泉？"
    output: []
  - input: "你帮我们生成商品，我帮你上漆贴金箔打扮得闪闪亮亮的"
    output: []
  - input: "我来放个魔法"
    output: []

term_categories:
  - "人名"
  - "种族名"
  - "物品名"
  - "地名"
  - "书名"
  - "技能/魔法/配方名"

translation_rules:
  - "目标语言：英文"
  - "统一意译为主，传达原文含义"
  - "人名按通行/音译形式处理，保持全篇一致"
  - "每个术语一行，格式：中文术语 → 英文译文"
